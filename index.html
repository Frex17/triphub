<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TripHub</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TripHub">
<meta name="theme-color" content="#f5f6f8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f6f8;
    color: #1a1d24;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    -webkit-tap-highlight-color: transparent;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { padding: 28px 4px 24px; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  header p { color: #6b7280; font-size: 14px; margin-top: 4px; }
  .cards { display: flex; flex-direction: column; gap: 12px; }
  a.card, div.card {
    display: flex; align-items: center; gap: 14px;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 18px 16px;
    text-decoration: none;
    color: inherit;
    transition: transform .08s ease;
  }
  a.card:active { transform: scale(0.98); }
  .card .emoji {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; background: #f0f1f4; flex-shrink: 0;
  }
  .card .txt { flex: 1; min-width: 0; }
  .card .txt b { display: block; font-size: 16px; }
  .card .txt span { display: block; font-size: 13px; color: #6b7280; margin-top: 2px; }
  .card .arrow { color: #9ca3af; font-size: 18px; }
  .card.soon { opacity: 0.55; }
  .card.soon .badge {
    font-size: 11px; font-weight: 600; color: #6b7280;
    background: #eceef2; border-radius: 999px; padding: 4px 10px;
  }
  footer { text-align: center; color: #9ca3af; font-size: 12px; padding: 28px 0 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>TripHub</h1>
    <p>Tutto per organizzare i viaggi della crew</p>
  </header>

  <div class="cards">
    <div class="card soon">
      <div class="emoji">🧳</div>
      <div class="txt">
        <b>Viaggi</b>
        <span>Eventi, spostamenti, alloggio e budget</span>
      </div>
      <div class="badge">In arrivo</div>
    </div>

    <a class="card" href="/swap/">
      <div class="emoji">🔄</div>
      <div class="txt">
        <b>Swap Planner</b>
        <span>Turni e cambi con la crew, sincronizzato</span>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="/flightscan/">
      <div class="emoji">✈️</div>
      <div class="txt">
        <b>FlightScan</b>
        <span>Ricerca voli e combinazioni Ryanair</span>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <footer>TripHub · v0.1</footer>
</div>
</body>
</html>
